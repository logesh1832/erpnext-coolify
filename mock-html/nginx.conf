# Serves the static Oman e-invoice demo at /mock-html
# Coolify's reverse proxy routes https://erpnext.wisright.com/mock-html here
# and passes the path through unchanged (no prefix stripping), so we match
# /mock-html explicitly and return the single self-contained index.html.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # demo, with or without trailing slash
    location = /mock-html {
        try_files /index.html =404;
    }
    location = /mock-html/ {
        try_files /index.html =404;
    }

    # fallback (this service only receives /mock-html traffic in production)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
