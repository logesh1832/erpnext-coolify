# Serves the static Oman e-invoice multi-flow demo tree at /demos.
#
# Coolify's Traefik proxy STRIPS the /demos prefix before forwarding, so the
# container receives bare /... paths. The tree is therefore baked at the nginx
# ROOT (/usr/share/nginx/html) and served by direct path match.
#
# The rewrite below is defensive: if a deployment forwards the /demos prefix
# unchanged (no strip), it drops the prefix so the same files still resolve.
# absolute_redirect off keeps any redirect relative so it stays on https behind
# the TLS-terminating proxy.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Non-stripping deployments: send bare /demos to /demos/ for a clean base.
    location = /demos {
        return 301 /demos/;
    }

    location / {
        # Drop the /demos prefix if the proxy did not strip it.
        rewrite ^/demos/(.*)$ /$1 break;
        try_files $uri $uri/ =404;
    }
}
