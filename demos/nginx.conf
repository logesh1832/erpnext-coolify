# Serves the static Oman e-invoice multi-flow demo tree at /demos.
# Coolify's Traefik proxy routes https://erpnext.wisright.com/demos here and
# passes the /demos prefix through unchanged (no stripping), so the whole tree
# is baked under .../html/demos/ and served by direct path match.
# absolute_redirect off keeps the trailing-slash redirect relative (/demos/)
# so it stays on https behind the TLS-terminating proxy.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    absolute_redirect off;

    # Every request to this service is /demos/... and maps to a real baked file.
    # try_files handles the landing page, each flow's index.html, screens and CSS.
    location / {
        try_files $uri $uri/ =404;
    }
}
